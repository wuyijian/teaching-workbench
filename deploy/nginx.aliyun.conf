# ─────────────────────────────────────────────────────────────────────
# 教学工作台 Web 版 ─ 阿里云 Nginx 生产配置
# 用法：
#   1. 把本文件放到 /etc/nginx/sites-available/teaching-workbench
#   2. 把所有 your-domain.com 替换成你自己的域名（两处）
#   3. ln -s /etc/nginx/sites-available/teaching-workbench /etc/nginx/sites-enabled/
#      rm -f /etc/nginx/sites-enabled/default
#      nginx -t && systemctl reload nginx
#   4. certbot --nginx -d your-domain.com -d www.your-domain.com   # 自动加 HTTPS
# ─────────────────────────────────────────────────────────────────────

# HTTP → HTTPS 重定向（certbot 跑完会自动生成，这里先留 HTTP 版本，方便首次签发）
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    root /var/www/teaching-workbench;
    index index.html;

    # ─── 上传上限 ───
    # 讯飞转写音频可能超过 100MB（2 小时课），设宽松一点
    client_max_body_size 500M;
    client_body_buffer_size 1M;

    # ─── Gzip ───
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ─── 安全头 ───
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── 静态资源缓存：JS / CSS / 图片 ───
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html 不缓存，保证发版立即可见
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ────────────────────────────────────────────────────
    # 反代：讯飞企业版录音转写
    # 前端代码通过 fetch('/xfyun-api/v2/upload?...') 调用
    # ────────────────────────────────────────────────────
    location /xfyun-api/ {
        proxy_pass https://office-api-ist-dx.iflyaisol.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host office-api-ist-dx.iflyaisol.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件上传：关闭请求缓冲，直接边收边转发
        client_max_body_size 500M;
        proxy_request_buffering off;
        proxy_http_version 1.1;

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ────────────────────────────────────────────────────
    # 反代：Kimi (Moonshot AI) ─ 反馈生成 / Agent / 内容问答
    # ★ 重点：必须关闭 proxy_buffering，否则 SSE 流式响应会被缓存，
    #         前端"打字机"效果消失，反馈生成卡几十秒才一次性出全文
    # ────────────────────────────────────────────────────
    location /moonshot-api/ {
        proxy_pass https://api.moonshot.cn/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.moonshot.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ────────────────────────────────────────────────────
    # 反代：OpenAI（备用，桌面端可能直接用）
    # ────────────────────────────────────────────────────
    location /openai-api/ {
        proxy_pass https://api.openai.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.openai.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # ────────────────────────────────────────────────────
    # SPA fallback ─ 必须放最后
    # ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
